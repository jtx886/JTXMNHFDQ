<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你号 · 反地区</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#ff00ff', // 改为霓虹粉紫
                        darkCore: '#050816',
                        glass: '#0b1120',
                    },
                    fontFamily: {
                        cyber: ['Consolas', 'Monaco', 'monospace'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow-neon {
                text-shadow: 0 0 12px currentColor, 0 0 24px currentColor;
            }
            .glow-border {
                box-shadow: 0 0 0 1px currentColor, 0 0 20px rgba(255, 0, 255, 0.2);
            }
        }
    </style>
    
    <style>
        body {
            background: #050816;
            overflow-x: hidden;
        }
        /* 扫描线效果改为粉紫色 */
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 49%,
                rgba(255, 0, 255, 0.08) 49%,
                rgba(255, 0, 255, 0.08) 51%,
                transparent 51%
            );
            pointer-events: none;
            animation: scan 8s linear infinite;
            opacity: 0.8;
            z-index: 1;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        /* 鼠标光晕改为粉紫色 */
        .mouse-glow {
            position: fixed;
            width: 220px;
            height: 220px;
            background: radial-gradient(
                circle at center,
                rgba(255, 0, 255, 0.15) 0%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 999;
            transition: 0.15s ease-out;
        }
    </style>
</head>
<body class="font-cyber text-white">

<!-- 沉浸式背景 -->
<div class="scanline"></div>
<div class="mouse-glow" id="mouseGlow"></div>

<!-- 主容器 -->
<div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-12 z-10">

    <!-- 标题区 -->
    <div class="mb-10 text-center">
        <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold text-neon text-shadow-neon tracking-tight">
            <i class="fa-solid fa-user-secret mr-3"></i>杰同学迷你号反地区
        </h1>
        <p class="text-slate-400 text-lg mt-2">迷你世界反地区 · 地区精准查询</p>
        <div class="text-green-400/70 text-sm italic mt-1">
            安全验证 · 数据通道已加密
        </div>
    </div>

    <!-- 核心终端卡片 -->
    <div class="w-full max-w-lg bg-glass/80 backdrop-blur-xl rounded-2xl border border-neon/30 p-8 shadow-[0_0_40px_rgba(255, 0, 255, 0.15)]">

        <!-- 终端状态栏 -->
        <div class="flex items-center justify-between border-b border-neon/20 pb-3 mb-6">
            <div class="flex items-center gap-2 text-neon text-sm">
                <i class="fa-solid fa-shield-halved"></i>
                <span>安全等级：A级 | 接口状态：运行中</span>
            </div>
            <div class="text-slate-400 text-xs">
                ID: CH-20260306
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="mb-6">
            <label class="block text-neon text-sm mb-2 flex items-center gap-2">
                <span class="text-neon">&gt;_</span> 输入迷你号 · MINI ID
            </label>
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neon">
                    <i class="fa-solid fa-hashtag"></i>
                </span>
                <input 
                    type="number" 
                    id="miniIdInput" 
                    class="w-full bg-darkCore/80 border border-neon/40 rounded-lg px-10 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon transition-all duration-300"
                    placeholder="请输入迷你号..."
                >
            </div>
        </div>

        <!-- 查询按钮 -->
        <button 
            id="queryBtn"
            class="w-full bg-neon hover:bg-neon/80 text-darkCore font-medium py-3.5 rounded-lg transition-all duration-300 flex items-center justify-center gap-2 glow-border text-shadow-neon"
        >
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>查询地区</span>
        </button>

        <!-- 结果区域 -->
        <div id="resultBox" class="hidden mt-6 border border-neon/20 rounded-xl p-6 bg-darkCore/60 text-center">
            <div class="text-green-400 text-sm mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-check-circle"></i>
                查询完成 · 地区信息已获取
            </div>
            <div id="resultText" class="text-2xl font-bold text-neon text-shadow-neon">
                
            </div>
            <div class="text-slate-400 text-xs mt-2">
                数据已加密传输 · 无残留代码
            </div>
        </div>

    </div>

    <!-- 备案 & 作者 -->
    <div class="mt-8 text-center text-slate-500 text-sm z-10">
        <p>作者：杰同学🐾 | 备案号：桂ICP备202602110908号</p>
    </div>
</div>

<script>
    // 鼠标光晕跟随
    document.addEventListener("mousemove", (e) => {
        const glow = document.getElementById('mouseGlow');
        glow.style.left = e.clientX - 110 + 'px';
        glow.style.top = e.clientY - 110 + 'px';
    });

    // DOM 元素
    const miniIdInput = document.getElementById("miniIdInput");
    const queryBtn = document.getElementById("queryBtn");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");

    
    const API_URL = "https://jtxnb886.754905712.workers.dev";

    // 查询事件
    queryBtn.addEventListener("click", async () => {
        const miniId = miniIdInput.value.trim();

        // 验证迷你号
        if (!miniId || miniId.length < 6) {
            alert("请输入有效的6位以上迷你号");
            return;
        }

        // 按钮加载态
        queryBtn.disabled = true;
        queryBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 正在查询...`;
        resultBox.classList.add("hidden");

        try {
            
            const response = await fetch(`${API_URL}?uin=${miniId}`);
            const rawData = await response.text();

            // 核心：解析 JSON
            let finalArea = "未查询到有效地区";
            try {
                const jsonData = JSON.parse(rawData);
                if (jsonData.data && jsonData.data.addr && jsonData.data.caddr) {
                    finalArea = `${jsonData.data.addr} ${jsonData.data.caddr}`; // 拼接省+市
                } else if (jsonData.data && jsonData.data.addr) {
                    finalArea = jsonData.data.addr;
                }
            } catch (parseErr) {
                finalArea = "数据查询失败 · 未知地区";
            }

            // 最终地区
            resultText.textContent = finalArea;
            resultBox.classList.remove("hidden");
            // 平滑滚动到结果
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });

        } catch (requestErr) {
            // 网络失败
            resultText.textContent = "网络异常 · 查询失败";
            resultText.style.color = "#ff4d4d";
            resultBox.classList.remove("hidden");
        } finally {
            // 恢复按钮
            queryBtn.disabled = false;
            queryBtn.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> 查询地区`;
        }
    });

    // 回车查询
    miniIdInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") queryBtn.click();
    });
</script>

</body>
</html>
